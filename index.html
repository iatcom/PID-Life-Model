<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Performance PID</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap');

  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --hardwork: #ef4444; 
    --experience: #f59e0b; 
    --planning: #10b981; 
    --target: #6366f1;
  }

  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 15px; max-width: 600px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 15px; }
  h1 { font-size: 1.2rem; font-weight: 700; margin: 0; }
  .subtitle { font-size: 0.8rem; color: var(--muted); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .card-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; display: block; }
  
  canvas { width: 100%; height: 240px; background: #fff; border-radius: 8px; border: 1px solid var(--border); }

  .slider-group { margin-bottom: 12px; }
  .slider-info { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; }
  .slider-desc { font-weight: 400; font-size: 0.7rem; color: var(--muted); }

  input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; border: 2px solid currentColor; cursor: pointer; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .m-box { background: #f1f5f9; padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
  .m-label { font-size: 0.6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
  .m-val { font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; font-weight: 600; }

  .c-hw { color: var(--hardwork); }
  .c-ex { color: var(--experience); }
  .c-pl { color: var(--planning); }
  .c-tg { color: var(--target); }
</style>
</head>
<body>

<header>
  <h1>The Human PID Balance</h1>
  <div class="subtitle">Action, Experience, and Foresight</div>
</header>

<div class="card">
  <span class="card-title">Live Response Graph</span>
  <canvas id="plot"></canvas>
</div>

<div class="card">
  <span class="card-title">Behavioral Traits</span>
  
  <div class="slider-group">
    <div class="slider-info">
      <span>Hard Work <span class="slider-desc">(Kp)</span></span>
      <span class="c-hw" id="v-hw">2.0</span>
    </div>
    <input type="range" id="hw" min="0" max="5" step="0.1" value="2.5" class="c-hw">
  </div>

  <div class="slider-group">
    <div class="slider-info">
      <span>Experience <span class="slider-desc">(Ki)</span></span>
      <span class="c-ex" id="v-ex">0.5</span>
    </div>
    <input type="range" id="ex" min="0" max="4" step="0.1" value="0.8" class="c-ex">
  </div>

  <div class="slider-group">
    <div class="slider-info">
      <span>Planning <span class="slider-desc">(Kd - Dampening)</span></span>
      <span class="c-pl" id="v-pl">0.5</span>
    </div>
    <input type="range" id="pl" min="0" max="2" step="0.01" value="0.5" class="c-pl">
  </div>

  <div style="border-top: 1px solid var(--border); margin: 15px 0;"></div>

  <div class="slider-group">
    <div class="slider-info">
      <span>Target Change</span>
      <span class="c-tg" id="v-tg">1.0</span>
    </div>
    <input type="range" id="tg" min="-1.5" max="1.5" step="0.1" value="1.0" class="c-tg">
  </div>
</div>

<div class="card">
  <span class="card-title">Outcome Analysis</span>
  <div class="metrics">
    <div class="m-box"><div class="m-label">Initiative</div><div class="m-val c-hw" id="m-rise">—</div></div>
    <div class="m-box"><div class="m-label">Burnout (Overshoot)</div><div class="m-val c-hw" id="m-burn">—</div></div>
    <div class="m-box"><div class="m-label">Stability Time</div><div class="m-val c-pl" id="m-settle">—</div></div>
    <div class="m-box"><div class="m-label">Reliability</div><div class="m-val c-ex" id="m-ss">—</div></div>
  </div>
</div>

<script>
const DT = 0.02, T = 12, N = Math.round(T / DT);
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');

function simulate(Kp, Ki, Kd, sp) {
  const out = new Float32Array(N);
  let y = 0, integral = 0, prevY = 0, filteredDeriv = 0;
  
  // Reduced filtering to make Kd more reactive/visible
  const lpf = 0.25; 

  for (let i = 0; i < N; i++) {
    const e = sp - y;
    
    // Experience (Integral)
    integral += e * DT;
    integral = Math.max(-2, Math.min(2, integral)); 

    // Planning (Derivative) - We use Kd * 4 to make the impact obvious
    const rawDeriv = (y - prevY) / DT;
    filteredDeriv = lpf * rawDeriv + (1 - lpf) * filteredDeriv;

    // The Force: Kp pulls forward, Ki pushes steady, Kd acts as the Brake (opposing velocity)
    let u = (Kp * e) + (Ki * integral) - (Kd * 5.0 * filteredDeriv);
    
    // Saturation (Human Limit)
    u = Math.max(-6, Math.min(6, u));

    // Plant: Human Inertia (lower factor = more 'swing', making Kd more useful)
    y += (u - y) * 0.1; 
    
    out[i] = y;
    prevY = y;
  }
  return out;
}

function update() {
  const hw = +document.getElementById('hw').value;
  const ex = +document.getElementById('ex').value;
  const pl = +document.getElementById('pl').value;
  const tg = +document.getElementById('tg').value;

  document.getElementById('v-hw').innerText = hw.toFixed(1);
  document.getElementById('v-ex').innerText = ex.toFixed(1);
  document.getElementById('v-pl').innerText = pl.toFixed(2);
  document.getElementById('v-tg').innerText = tg.toFixed(1);

  const data = simulate(hw, ex, pl, tg);
  draw(data, tg);
  
  // Metrics
  if (Math.abs(tg) < 0.1) return;
  const s = tg > 0 ? 1 : -1;
  const r1 = data.findIndex(v => s*v >= s*tg*0.9);
  document.getElementById('m-rise').innerText = r1 > 0 ? (r1*DT).toFixed(2)+'s' : '—';
  let max = 0;
  for(let v of data) if(s*v > s*max) max = v;
  const over = ((s*max - Math.abs(tg)) / Math.abs(tg)) * 100;
  document.getElementById('m-burn').innerText = over > 1 ? over.toFixed(1)+'%' : 'Healthy';
  let si = N-1;
  for(let i=N-1; i>=0; i--) if(Math.abs(data[i]-tg) > Math.abs(tg)*0.03) { si=i; break; }
  document.getElementById('m-settle').innerText = (si*DT).toFixed(1)+'s';
  document.getElementById('m-ss').innerText = data[N-1].toFixed(2);
}

function draw(data, sp) {
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = 240 * 2;
  ctx.scale(2,2);
  const w = W/2, h = H/2;
  ctx.clearRect(0,0,w,h);

  const PAD = { L: 40, R: 15, T: 30, B: 30 };
  const gW = w-PAD.L-PAD.R, gH = h-PAD.T-PAD.B;
  const toX = i => PAD.L + (i/(N-1))*gW;
  const toY = v => (h-PAD.B) - ((v + 2.5) / 5) * gH;

  // Burnout Zone (Subtle Red Area)
  if (sp !== 0) {
    const s = sp > 0 ? 1 : -1;
    ctx.fillStyle = 'rgba(239, 68, 68, 0.05)';
    if (s > 0) ctx.fillRect(PAD.L, PAD.T, gW, toY(sp * 1.1) - PAD.T);
    else ctx.fillRect(PAD.L, toY(sp * 1.1), gW, (h-PAD.B) - toY(sp * 1.1));
  }

  // Grid
  ctx.strokeStyle = '#f1f5f9';
  ctx.lineWidth = 1;
  for(let i=-2; i<=2; i+=1) {
    const y = toY(i);
    ctx.beginPath(); ctx.moveTo(PAD.L, y); ctx.lineTo(PAD.L+gW, y); ctx.stroke();
  }

  // Target Line
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = 'rgba(99, 102, 241, 0.5)';
  ctx.beginPath(); ctx.moveTo(PAD.L, toY(sp)); ctx.lineTo(PAD.L+gW, toY(sp)); ctx.stroke();
  ctx.setLineDash([]);

  // Labeling
  ctx.fillStyle = "#94a3b8";
  ctx.font = "bold 8px Plus Jakarta Sans";
  ctx.fillText("TARGET", PAD.L + 5, toY(sp) - 5);

  // Path Line
  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(0));
  for(let i=0; i<N; i++) ctx.lineTo(toX(i), data[i] > 2.5 ? toY(2.5) : data[i] < -2.5 ? toY(-2.5) : toY(data[i]));
  ctx.stroke();
}

document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));
window.addEventListener('resize', update);
update();
</script>
</body>
</html>
