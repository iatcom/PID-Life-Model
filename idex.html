<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PID Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #f4f5f7;
    --surface:   #ffffff;
    --border:    #e2e4e9;
    --text:      #1c1e24;
    --muted:     #8a8f9e;
    --kp:        #2563eb;   /* blue */
    --ki:        #d97706;   /* amber */
    --kd:        #059669;   /* emerald */
    --step:      #7c3aed;   /* violet */
    --plot-out:  #2563eb;
    --plot-sp:   #7c3aed;
    --plot-err:  #e55c5c;
    --track-bg:  #dde0e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: 0 0 32px;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  h1 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin: 12px 12px 0;
    padding: 14px 14px 16px;
  }

  .card-title {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Plot ── */
  canvas {
    display: block;
    width: 100%;
    border-radius: 6px;
    background: #f9fafb;
  }

  .legend {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .legend-swatch {
    width: 20px;
    height: 3px;
    border-radius: 2px;
  }

  .legend-swatch.dashed {
    background: repeating-linear-gradient(
      to right,
      var(--plot-sp) 0px, var(--plot-sp) 5px,
      transparent 5px, transparent 9px
    );
    height: 2px;
  }

  /* ── Sliders ── */
  .slider-group {
    margin-bottom: 18px;
  }
  .slider-group:last-child { margin-bottom: 0; }

  .slider-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .slider-label {
    font-size: 0.88rem;
    font-weight: 600;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .slider-label sub {
    font-size: 0.65em;
  }

  .slider-hint {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .slider-readout {
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    font-weight: 500;
    min-width: 44px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  /* Thumb shared */
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 3px solid var(--surface);
    box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    cursor: pointer;
  }

  /* Per-slider colors */
  #kp  { background: linear-gradient(to right, var(--kp)   var(--pct,30%), var(--track-bg) var(--pct,30%)); }
  #kp::-webkit-slider-thumb  { background: var(--kp); }

  #ki  { background: linear-gradient(to right, var(--ki)   var(--pct,15%), var(--track-bg) var(--pct,15%)); }
  #ki::-webkit-slider-thumb  { background: var(--ki); }

  #kd  { background: linear-gradient(to right, var(--kd)   var(--pct,10%), var(--track-bg) var(--pct,10%)); }
  #kd::-webkit-slider-thumb  { background: var(--kd); }

  #step { background: linear-gradient(to right, var(--track-bg) 50%, var(--track-bg) 50%); }
  #step::-webkit-slider-thumb { background: var(--step); }

  /* Step slider needs special center-fill handling via JS */

  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* ── Metrics ── */
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .metric-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
  }

  .metric-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .metric-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.92rem;
    font-weight: 500;
  }

  .c-kp   { color: var(--kp);   }
  .c-ki   { color: var(--ki);   }
  .c-kd   { color: var(--kd);   }
  .c-step { color: var(--step); }
</style>
</head>
<body>

<header>
  <h1>PID Simulator</h1>
  <span class="subtitle">step response</span>
</header>

<!-- PLOT FIRST -->
<div class="card">
  <div class="card-title">Step Response</div>
  <canvas id="plot" height="260"></canvas>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch dashed"></div>
      <span>Setpoint</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--plot-out)"></div>
      <span>Output</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--plot-err); opacity:.7"></div>
      <span>Error</span>
    </div>
  </div>
</div>

<!-- METRICS -->
<div class="card">
  <div class="card-title">Response Metrics</div>
  <div class="metrics">
    <div class="metric-box">
      <div class="metric-label">Rise Time</div>
      <div class="metric-val c-kp" id="m-rise">—</div>
    </div>
    <div class="metric-box">
      <div class="metric-label">Overshoot</div>
      <div class="metric-val c-ki" id="m-overshoot">—</div>
    </div>
    <div class="metric-box">
      <div class="metric-label">Settle Time</div>
      <div class="metric-val c-kd" id="m-settle">—</div>
    </div>
    <div class="metric-box">
      <div class="metric-label">Steady State</div>
      <div class="metric-val c-step" id="m-ss">—</div>
    </div>
  </div>
</div>

<!-- SLIDERS -->
<div class="card">
  <div class="card-title">PID Parameters</div>

  <!-- Kp -->
  <div class="slider-group">
    <div class="slider-row">
      <span class="slider-label c-kp">K<sub>p</sub> <span class="slider-hint">Proportional</span></span>
      <span class="slider-readout c-kp" id="kp-val">1.00</span>
    </div>
    <input type="range" id="kp" min="0" max="3" step="0.01" value="1.0">
  </div>

  <!-- Ki -->
  <div class="slider-group">
    <div class="slider-row">
      <span class="slider-label c-ki">K<sub>i</sub> <span class="slider-hint">Integral</span></span>
      <span class="slider-readout c-ki" id="ki-val">0.30</span>
    </div>
    <input type="range" id="ki" min="0" max="2" step="0.01" value="0.3">
  </div>

  <!-- Kd -->
  <div class="slider-group">
    <div class="slider-row">
      <span class="slider-label c-kd">K<sub>d</sub> <span class="slider-hint">Derivative</span></span>
      <span class="slider-readout c-kd" id="kd-val">0.10</span>
    </div>
    <input type="range" id="kd" min="0" max="1" step="0.01" value="0.1">
  </div>

  <div class="divider"></div>

  <!-- Step -->
  <div class="slider-group">
    <div class="slider-row">
      <span class="slider-label c-step">Step <span class="slider-hint">Amplitude</span></span>
      <span class="slider-readout c-step" id="step-val">+1.00</span>
    </div>
    <input type="range" id="step" min="-1" max="1" step="0.01" value="1.0">
  </div>
</div>

<script>
// ── Simulation ───────────────────────────────────────────────
// Plant: G(s) = 1 / (s + 1)  — Euler, dt=0.02s, T=20s
const DT = 0.02, T = 20;
const N  = Math.round(T / DT);  // 1000 pts

function simulate(Kp, Ki, Kd, sp) {
  const out = new Float32Array(N);
  const err = new Float32Array(N);
  let y = 0, integral = 0, prevE = 0;

  for (let i = 0; i < N; i++) {
    const e    = sp - y;
    integral  += e * DT;
    // clamp integral to avoid windup runaway on display
    integral   = Math.max(-6, Math.min(6, integral));
    const deriv = (e - prevE) / DT;
    const u    = Kp * e + Ki * integral + Kd * deriv;
    y         += (-y + u) * DT;
    out[i]     = y;
    err[i]     = e;
    prevE      = e;
  }
  return { out, err };
}

// ── Metrics ──────────────────────────────────────────────────
function metrics(out, sp) {
  if (sp === 0) return { rise: '—', over: '—', settle: '—', ss: '0.000' };

  const abssp = Math.abs(sp);
  const sign  = sp > 0 ? 1 : -1;
  const t10   = sp * 0.10, t90 = sp * 0.90;
  const tol   = abssp * 0.02;

  let r0 = -1, r1 = -1;
  for (let i = 0; i < N; i++) {
    if (r0 < 0 && sign * out[i] >= sign * t10) r0 = i;
    if (r0 >= 0 && sign * out[i] >= sign * t90) { r1 = i; break; }
  }
  const rise = r0 >= 0 && r1 >= 0 ? ((r1 - r0) * DT).toFixed(2) + ' s' : '—';

  let peak = out[0];
  for (let i = 1; i < N; i++) if (sign * out[i] > sign * peak) peak = out[i];
  const over = (((sign * peak - abssp) / abssp) * 100);
  const overStr = over > 0.05 ? over.toFixed(1) + ' %' : '0.0 %';

  let si = N - 1;
  for (let i = N - 1; i >= 0; i--) {
    if (Math.abs(out[i] - sp) > tol) { si = i + 1; break; }
  }
  const settle = (si * DT).toFixed(2) + ' s';

  return { rise, over: overStr, settle, ss: out[N-1].toFixed(3) };
}

// ── Canvas ───────────────────────────────────────────────────
const canvas = document.getElementById('plot');
const ctx    = canvas.getContext('2d');
const YMIN   = -3, YMAX = 3;

function resize() {
  const w = canvas.parentElement.clientWidth - 28; // card padding
  canvas.width  = w;
  canvas.height = 260;
}

function draw(out, err, sp) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const PAD = { t: 14, r: 12, b: 32, l: 42 };
  const PW = W - PAD.l - PAD.r;
  const PH = H - PAD.t  - PAD.b;

  const toX = i => PAD.l + (i / (N - 1)) * PW;
  const toY = v => PAD.t + PH - ((v - YMIN) / (YMAX - YMIN)) * PH;

  // ── background
  ctx.fillStyle = '#f9fafb';
  ctx.fillRect(0, 0, W, H);

  // ── grid lines
  const ySteps = [-3, -2, -1, 0, 1, 2, 3];
  ctx.lineWidth = 1;
  ySteps.forEach(v => {
    const y = toY(v);
    ctx.strokeStyle = v === 0 ? 'rgba(0,0,0,0.12)' : 'rgba(0,0,0,0.06)';
    ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(PAD.l + PW, y); ctx.stroke();
    ctx.fillStyle = '#9ca3af';
    ctx.font = '10px DM Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(v.toFixed(0), PAD.l - 5, y + 3.5);
  });

  const xSteps = [0, 5, 10, 15, 20];
  xSteps.forEach(t => {
    const idx = Math.round(t / DT);
    const x   = PAD.l + (Math.min(idx, N-1) / (N-1)) * PW;
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.beginPath(); ctx.moveTo(x, PAD.t); ctx.lineTo(x, PAD.t + PH); ctx.stroke();
    ctx.fillStyle = '#9ca3af';
    ctx.font = '10px DM Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(t + 's', x, PAD.t + PH + 14);
  });

  // clip to plot area
  ctx.save();
  ctx.beginPath();
  ctx.rect(PAD.l, PAD.t, PW, PH);
  ctx.clip();

  // ── Setpoint dashed
  if (sp !== 0) {
    ctx.strokeStyle = 'rgba(124,58,237,0.55)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 5]);
    ctx.beginPath();
    ctx.moveTo(PAD.l, toY(sp));
    ctx.lineTo(PAD.l + PW, toY(sp));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── Error line
  ctx.strokeStyle = 'rgba(229,92,92,0.55)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i < N; i++) {
    const x = toX(i), y = toY(err[i]);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // ── Output fill under curve
  const grad = ctx.createLinearGradient(0, PAD.t, 0, PAD.t + PH);
  grad.addColorStop(0, 'rgba(37,99,235,0.13)');
  grad.addColorStop(1, 'rgba(37,99,235,0.01)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(0));
  for (let i = 0; i < N; i++) ctx.lineTo(toX(i), toY(out[i]));
  ctx.lineTo(toX(N-1), toY(0));
  ctx.closePath();
  ctx.fill();

  // ── Output line
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < N; i++) {
    const x = toX(i), y = toY(out[i]);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.restore();

  // ── Border box
  ctx.strokeStyle = '#e2e4e9';
  ctx.lineWidth = 1;
  ctx.strokeRect(PAD.l, PAD.t, PW, PH);
}

// ── Slider track fill ────────────────────────────────────────
function trackFill(el) {
  const min = +el.min, max = +el.max, val = +el.value;
  if (el.id === 'step') {
    // center-fill for bipolar slider
    const center = ((0 - min) / (max - min)) * 100;
    const pos    = ((val - min) / (max - min)) * 100;
    const left   = Math.min(center, pos).toFixed(1);
    const right  = Math.max(center, pos).toFixed(1);
    el.style.background =
      `linear-gradient(to right, var(--track-bg) ${left}%, var(--step) ${left}%, var(--step) ${right}%, var(--track-bg) ${right}%)`;
  } else {
    const pct = ((val - min) / (max - min) * 100).toFixed(1);
    el.style.background =
      `linear-gradient(to right, var(--${el.id}) ${pct}%, var(--track-bg) ${pct}%)`;
  }
}

// ── Update ───────────────────────────────────────────────────
function update() {
  const Kp  = +document.getElementById('kp').value;
  const Ki  = +document.getElementById('ki').value;
  const Kd  = +document.getElementById('kd').value;
  const sp  = +document.getElementById('step').value;

  document.getElementById('kp-val').textContent   = Kp.toFixed(2);
  document.getElementById('ki-val').textContent   = Ki.toFixed(2);
  document.getElementById('kd-val').textContent   = Kd.toFixed(2);
  document.getElementById('step-val').textContent = (sp >= 0 ? '+' : '') + sp.toFixed(2);

  ['kp','ki','kd','step'].forEach(id => trackFill(document.getElementById(id)));

  if (sp === 0) {
    // flat zero — no simulation needed
    const zero = new Float32Array(N);
    draw(zero, zero, 0);
    document.getElementById('m-rise').textContent     = '—';
    document.getElementById('m-overshoot').textContent = '—';
    document.getElementById('m-settle').textContent   = '—';
    document.getElementById('m-ss').textContent       = '0.000';
    return;
  }

  const { out, err } = simulate(Kp, Ki, Kd, sp);
  const m = metrics(out, sp);

  document.getElementById('m-rise').textContent      = m.rise;
  document.getElementById('m-overshoot').textContent = m.over;
  document.getElementById('m-settle').textContent    = m.settle;
  document.getElementById('m-ss').textContent        = m.ss;

  draw(out, err, sp);
}

// ── Init ─────────────────────────────────────────────────────
['kp','ki','kd','step'].forEach(id =>
  document.getElementById(id).addEventListener('input', update));

window.addEventListener('resize', () => { resize(); update(); });

resize();
update();
</script>
</body>
</html>
